name: Sync Upstream Microsoft/PowerToys
run-name: Sync upstream main
on:
  workflow_dispatch:
  # 每2小时自动同步一次上游
  schedule:
    - cron: '0 */2 * * *'

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-source:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout local fork code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add upstream remote repo
        run: git remote add upstream https://github.com/microsoft/PowerToys.git

      - name: Fetch upstream all branches
        run: git fetch upstream

      - name: Switch to local main branch
        run: git checkout main

      - name: Merge upstream/main into local main
        run: git merge upstream/main --no-edit

      - name: Push synced code back to your fork
        env:
          GH_TOKEN: ${{ github.token }}
        run: git push origin main
