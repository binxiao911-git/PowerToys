name: PowerToys Nightly Build & Release
run-name: Nightly Build ${{ github.sha }}
on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

permissions:
  contents: write
  pull-requests: write
  actions: write

env:
  PLATFORM: x64
  CONFIG: Release
  RETAIN_RELEASE_COUNT: 15
  GH_TOKEN: ${{ github.token }}

jobs:
  build-installer:
    runs-on: windows-2022
    steps:
      - name: Checkout full source & submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup .NET SDK 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Run official build script (Only main program, skip installer package)
        shell: pwsh
        run: |
          .\tools\build\build.ps1 -Platform $env:PLATFORM -Configuration $env:CONFIG -CIBuild $true
        env:
          CI: true

      - name: Collect compiled exe artifacts
        shell: pwsh
        run: |
          mkdir -Force .\artifacts
          Copy-Item .\x64\Release\*.exe .\artifacts\ -Recurse
          Get-ChildItem .\artifacts

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: powertoys-nightly-packages
          path: ./artifacts/
          retention-days: 30

  publish-nightly-release:
    needs: build-installer
    runs-on: windows-2022
    steps:
      - name: Download built exe packages
        uses: actions/download-artifact@v4
        with:
          name: powertoys-nightly-packages
          path: ./artifacts

      - name: Install GitHub CLI
        shell: pwsh
        run: choco install gh -y

      - name: Generate nightly tag & title
        id: taggen
        shell: pwsh
        run: |
          $dateTag = "nightly-$(Get-Date -Format 'yyyy.MM.dd')"
          echo "TAG=$dateTag" >> $env:GITHUB_ENV
          echo "TITLE=PowerToys Nightly Build $(Get-Date -Format 'yyyy-MM-dd')" >> $env:GITHUB_ENV

      - name: Cleanup old nightly releases (keep ${{ env.RETAIN_RELEASE_COUNT }})
        shell: pwsh
        run: |
          $releases = gh release list --limit 100 --json tagName,id | ConvertFrom-Json
          $nightlyReleases = $releases | Where-Object { $_.tagName -match '^nightly-\d{4}\.\d{2}\.\d{2}$' }
          $toDelete = $nightlyReleases | Select-Object -Skip $env:RETAIN_RELEASE_COUNT
          foreach ($r in $toDelete) {
            Write-Host "Delete old release: $($r.tagName) ID:$($r.id)"
            gh release delete $r.tagName -y
          }

      - name: Create new nightly release & upload exe
        shell: pwsh
        run: |
          $releaseNotes = @"
Auto-built nightly from main branch commit: ${{ github.sha }}
Build Time: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')
Platform: x64 Release
Note: This build skips MSI installer packaging due to WiX network installation issues, only raw exe provided.
Auto-synced upstream microsoft/PowerToys main source
"@
          gh release create $env:TAG --title "$env:TITLE" --prerelease --notes "$releaseNotes" ./artifacts/*.exe
