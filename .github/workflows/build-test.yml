name: Build Test

on:
  workflow_dispatch:

jobs:
 build:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: microsoft/setup-msbuild@v2

      - name: Check MSBuild
        run: |
          msbuild -version

      - name: Check .NET
        run: dotnet --info
